<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>ドロッパー｜リンクを開いています…</title>
  <style>
    body { font-family:-apple-system,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
      background:#fbfffe; color:#0f3d3a; margin:0; min-height:100vh; display:flex;
      align-items:center; justify-content:center; text-align:center; padding:24px; }
    .box { max-width:440px; }
    .sp { width:30px; height:30px; margin:0 auto 16px; border:3px solid #cdeae6;
      border-top-color:#06b6a4; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { font-size:15px; line-height:1.7; margin:8px 0; }
    a { color:#048b7f; font-weight:700; word-break:break-all; }
    .brand { font-size:13px; color:#4f7c78; margin-top:22px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="sp" id="sp"></div>
    <p id="msg">リンクを開いています…</p>
    <p id="manual" style="display:none"><a id="link" href="#" rel="noopener">こちらをタップして開いてください</a></p>
    <p class="brand">DROPPER ● ドロッパー</p>
  </div>
  <script>
  (function () {
    // base64url（% を含まない）→ UTF-8 文字列
    function b64urlDecode(s) {
      s = String(s || '').replace(/-/g, '+').replace(/_/g, '/');
      while (s.length % 4) s += '=';
      return decodeURIComponent(escape(atob(s)));
    }
    function getParam(name) {
      var m = new RegExp('[?&]' + name + '=([^&]+)').exec(location.search);
      return m ? m[1] : '';
    }
    function fail() {
      var sp = document.getElementById('sp'); if (sp) sp.style.display = 'none';
      document.getElementById('msg').textContent = 'リンクを開けませんでした。案内文のリンクからもう一度お試しください。';
    }
    try {
      var raw = getParam('d');
      if (!raw) return fail();
      var o = JSON.parse(b64urlDecode(raw));
      var url = '';
      if (o.t === 'm') {
        // 地図
        url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(o.q || '');
      } else {
        // カレンダー予定の追加（renderテンプレ）。ここは通常のブラウザ文脈なので単一エンコードで正しく組み立つ。
        var p = 'action=TEMPLATE'
          + '&text=' + encodeURIComponent(o.x || '')
          + (o.d ? '&dates=' + o.d : '')                                   // 'YYYYMMDD/YYYYMMDD'（数字と/のみ）
          + (o.l ? '&location=' + encodeURIComponent(o.l) : '')
          + (o.n ? '&details=' + encodeURIComponent(o.n) : '');
        url = 'https://calendar.google.com/calendar/render?' + p;
      }
      // 自動転送が抑止される環境向けに手動リンクも表示
      var a = document.getElementById('link');
      a.href = url;
      document.getElementById('manual').style.display = 'block';
      location.replace(url);
    } catch (e) {
      fail();
    }
  })();
  </script>
</body>
</html>
